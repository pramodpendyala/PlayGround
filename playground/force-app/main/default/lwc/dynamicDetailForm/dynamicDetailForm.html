<template>
    <lightning-card title="Dynamic Record Details" icon-name="standard:record">
        <div class="slds-p-horizontal_medium">
            <template if:true={formLayout}>
                <lightning-record-edit-form
                    record-id={recordId}
                    object-api-name={objectApiName}>
                    <template for:each={formLayout} for:item="row">
                        <lightning-layout key={row.rowNumber} multiple-rows>
                            <template for:each={row.fields} for:item="field">
                                <lightning-layout-item
                                    key={field}
                                    size="6"
                                    padding="around-small">
                                    <lightning-input-field field-name={field}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                        </lightning-layout>
                    </template>

                    <div class="slds-m-top_medium slds-text-align_center">
                        <lightning-button type="submit" variant="brand" label="Save"></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </template>
            <template if:false={formLayout}>
                <p>Loading configuration...</p>
            </template>
        </div>
    </lightning-card>
</template>
