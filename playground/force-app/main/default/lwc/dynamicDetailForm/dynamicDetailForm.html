<template>
    <lightning-card title="Dynamic Metadata Form" icon-name="standard:record">
        

        <div class="slds-p-horizontal_medium">
            <lightning-record-edit-form 
                record-id={recordId} 
                object-api-name={objectApiName}
                mode={formMode}
                onsuccess={handleSuccess}>
                
                <lightning-accordion 
                    allow-multiple-sections-open 
                    active-section-name={activeSections}>
                    
                    <template for:each={formLayout} for:item="section">
                        <lightning-accordion-section key={section.id} name={section.id} label={section.label}>
                            
                            <template if:true={section.hasHeaders}>
                                <lightning-layout class="slds-theme_shade slds-m-bottom_small">
                                    <lightning-layout-item size="6" padding="around-small"><strong>{section.headerLeft}</strong></lightning-layout-item>
                                    <lightning-layout-item size="6" padding="around-small"><strong>{section.headerRight}</strong></lightning-layout-item>
                                </lightning-layout>
                            </template>

                            <template for:each={section.rows} for:item="row">
                                <lightning-layout key={row.rowNumber} multiple-rows>
                                    <template for:each={row.fields} for:item="field">
                                        <lightning-layout-item key={field.apiName} size="6" padding="around-small">
                                            
                                            <template if:true={field.isSpacer}>
                                                <div class="slds-p-around_medium"></div>
                                            </template>
                                            
                                            <template if:false={field.isSpacer}>
                                                 <template if:false={isReadOnly}>
                                                <div onclick={handleFieldClick} onchange={handleFieldChange} data-field={field.apiName} class="field-container">
                                                    <lightning-input-field field-name={field.apiName} data-field={field.apiName} variant="label-stacked">
                                                    </lightning-input-field>
                                                </div>
                                                </template>
                                                 <template if:true={isReadOnly}>
                                                    <lightning-output-field field-name={field.apiName} data-field={field.apiName} variant="label-stacked">
                                                    </lightning-output-field>
                                                 </template>
                                            </template>

                                        </lightning-layout-item>
                                    </template>
                                </lightning-layout>
                            </template>

                        </lightning-accordion-section>
                    </template>
                </lightning-accordion>

                <template if:false={isReadOnly}>
                    <div class="slds-m-top_medium slds-text-align_center">
                        <lightning-button type="submit" variant="brand" label="Save"></lightning-button>
                    </div>
                </template>
                <template if:true={isReadOnly}>
                    <div class="slds-m-top_medium slds-text-align_center">
                        <lightning-button 
            slot="actions" 
            label={modeButtonLabel} 
            onclick={toggleMode}>
        </lightning-button>
                    </div>
                </template>

            </lightning-record-edit-form>
        </div>
        
    </lightning-card>
</template>
